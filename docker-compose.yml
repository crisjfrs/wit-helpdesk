services:
  app:
    image: ticketone-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketone_app
    restart: always
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - ticketone

  queue-worker:
    image: ticketone-app:latest
    container_name: ticketone_queue
    restart: always
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - .:/var/www
    depends_on:
      - app
      - db
    networks:
      - ticketone

  webserver:
    image: nginx:alpine
    container_name: ticketone_web
    ports:
      - "8010:80"
    restart: always
    volumes:
      - .:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - ticketone

  db:
    image: mysql:8.0
    container_name: ticketone_db
    restart: always
    environment:
      MYSQL_DATABASE: helpdesk_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "6033:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - ticketone

volumes:
  dbdata:

networks:
  ticketone: