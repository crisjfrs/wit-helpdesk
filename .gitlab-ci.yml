stages:
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

build:
  stage: build
  tags:
    - server
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "$DEV_ENV" > .env
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
  only:
    - development

deploy:
  stage: deploy
  tags:
    - server
  script:
    - cd /home/wit/ticketone
    - git remote set-url origin https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/wit-id/pkl-2026/ticketone.git
    - git fetch origin development
    - git checkout development
    - git reset --hard origin/development
    - git clean -fd
    - docker compose down
    - docker compose up -d --build
    # Wait for MySQL to be ready
    - |
      echo "Waiting for MySQL to be ready..."
      for i in $(seq 1 30); do
        if docker compose exec -T db mysqladmin ping -u root --silent; then
          echo "MySQL is up and running!"
          break
        fi
        echo "MySQL not ready yet... ($i/30)"
        sleep 3
        if [ $i -eq 30 ]; then echo "Error: MySQL timeout"; exit 1; fi
      done
    # Run migrations
    - docker compose exec -T app php artisan migrate --force
    # Clear config cache
    - docker compose exec -T app php artisan optimize:clear
  only:
    - development