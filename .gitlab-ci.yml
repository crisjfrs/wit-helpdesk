stages:
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "$DEV_ENV" > .env
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
  only:
    - development

deploy:
  stage: deploy
  tags:
    - server
  script:
    - cd /home/wit/ticketone
    - docker compose pull
    - docker compose up -d --force-recreate
  only:
    - development